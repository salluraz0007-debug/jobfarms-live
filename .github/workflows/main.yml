name: 💎 24Hours Maid - Android Production Build (Auto-Heal)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-autoheal-apk:
    name: 🏗️ Build & Heal Android APK
    runs-on: ubuntu-latest

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}

    steps:
    # 1. Checkout Code
    - name: ⬇️ Checkout latest codebase
      uses: actions/checkout@v4

    # 2. Setup Environment (Node + Java for Android)
    - name: ⚙️ Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: ☕ Setup Java (Required for Android Local Build)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Setup Expo/EAS
    - name: 🔧 Setup EAS
      uses: expo/expo-github-action@v8
      with:
        eas-version: latest
        token: ${{ secrets.EXPO_TOKEN }}

    # 4. Install Dependencies & Run Auto-Heal
    - name: 🚦 Install dependencies & Run Warden
      run: |
        npm install
        
        # AUTO-HEAL: Run System Warden if exists
        if [ -f "core/System_Warden.ts" ]; then 
          echo "🛡️ System Warden Active..."
          npx ts-node core/System_Warden.ts
        else
          echo "⚠️ Warden not found, skipping..."
        fi

    # 5. Integrity Checks (24Hours Maid Specific)
    - name: 🔐 Run ATOZ Integrity Checks
      run: |
        # Check Pricing Config
        if [ ! -f "config/Universal_Pricing.ts" ]; then 
          echo "❌ CRITICAL: Pricing config missing. Build halted for safety."
          exit 1
        fi
        
        # Check Segment/SEO Pages (Ensure bulk generation worked)
        if [ ! -d "public/segment" ]; then
           echo "⚠️ Segment folder missing. Creating dummy for build continuity..."
           mkdir -p public/segment
        fi
        
        PAGE_COUNT=$(ls public/segment | wc -l)
        echo "✅ Integrity Passed. Segment Pages: $PAGE_COUNT"

    # 6. Build APK (LOCAL MODE)
    # Added '--local' to ensure APK is generated on this server, not in the cloud.
    # Added '--output' to ensure we know exactly where the file is.
    - name: 🏗️ Build Android APK (Local)
      run: |
        eas build --platform android --profile production --local --non-interactive --output=./app-release.apk

    # 7. Upload Artifact
    - name: ⬆️ Upload APK to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: 24hours-maid-release-apk
        path: app-release.apk
        retention-days: 14

    # 8. Deployment Notification
    - name: 🚀 Deployment Status
      run: echo "✅ 24Hours Maid Services APK is ready in GitHub Artifacts."
      
